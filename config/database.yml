# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  primary_replica:
    <<: *default
    database: storage/development.sqlite3
    replica: true
  primary_shard_one:
    <<: *default
    database: storage/development_shard_one.sqlite3
    migrations_paths: db/shard_one_migrate
  primary_shard_two:
    <<: *default
    database: storage/development_shard_two.sqlite3
    migrations_paths: db/shard_two_migrate
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  primary_replica:
    <<: *default
    database: storage/test.sqlite3
    replica: true
  primary_shard_one:
    <<: *default
    database: storage/test_shard_one.sqlite3
    migrations_paths: db/shard_one_migrate
  primary_shard_two:
    <<: *default
    database: storage/test_shard_two.sqlite3
    migrations_paths: db/shard_two_migrate
  cache:
    <<: *default
    database: storage/test_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/test_cable.sqlite3
    migrations_paths: db/cable_migrate


# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  primary_replica:
    <<: *default
    database: storage/production.sqlite3
    replica: true
  primary_shard_one:
    <<: *default
    database: storage/production_shard_one.sqlite3
    migrations_paths: db/shard_one_migrate
  primary_shard_two:
    <<: *default
    database: storage/production_shard_two.sqlite3
    migrations_paths: db/shard_two_migrate
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate

api_only:
  primary:
    <<: *default
    database: storage/api_only.sqlite3
  primary_replica:
    <<: *default
    database: storage/api_only.sqlite3
    replica: true
  primary_shard_one:
    <<: *default
    database: storage/api_only_shard_one.sqlite3
    migrations_paths: db/shard_one_migrate
  primary_shard_two:
    <<: *default
    database: storage/api_only_shard_two.sqlite3
    migrations_paths: db/shard_two_migrate
  cache:
    <<: *default
    database: storage/api_only_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/api_only_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/api_only_cable.sqlite3
    migrations_paths: db/cable_migrate
